<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gambit FPV Flight Log</title>

<style>
:root{
  --bg:#0b1018;
  --bg2:#111826;
  --card:rgba(24,30,42,.9);
  --card2:rgba(35,43,58,.95);
  --text:#f5f7fb;
  --muted:#aab3c2;
  --gold:#f5c400;
  --gold2:#ffdf5e;
  --line:rgba(255,255,255,.08);
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --danger:#c62828;
  --secondary:#30394a;
  --radius:18px;
}

* { box-sizing:border-box; }

html, body {
  margin:0;
  padding:0;
  background:
    radial-gradient(circle at top right, rgba(245,196,0,.12), transparent 22%),
    linear-gradient(180deg, var(--bg2), var(--bg));
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  min-height:100%;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('logo.png') center center no-repeat;
  background-size:72%;
  opacity:.035;
  pointer-events:none;
  filter:grayscale(.1);
}

.app {
  max-width:760px;
  margin:0 auto;
  padding:16px 12px 28px;
}

.header {
  text-align:center;
  padding:12px 8px 18px;
}

.logo-wrap{
  width:120px;
  height:120px;
  margin:0 auto 14px;
  border-radius:26px;
  padding:8px;
  background:linear-gradient(145deg, rgba(245,196,0,.28), rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 30px rgba(245,196,0,.08), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
}

.header img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  display:block;
}

.header h1{
  margin:0;
  font-size:30px;
  letter-spacing:.06em;
  font-weight:900;
}

.header p{
  margin:6px 0 0;
  color:var(--muted);
  font-size:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(12px);
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.stat-card{
  background:var(--card2);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
}

.stat-label{
  color:var(--muted);
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.08em;
  margin-bottom:8px;
}

.stat-value{
  font-size:28px;
  font-weight:900;
  line-height:1;
}

.field-group{
  margin-bottom:14px;
}

label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
  font-weight:700;
  color:#eef2f8;
}

input, select, button{
  width:100%;
  min-height:52px;
  border:none;
  outline:none;
  border-radius:16px;
  font-size:16px;
}

input, select{
  background:rgba(255,255,255,.06);
  color:var(--text);
  padding:0 14px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}

input::placeholder{
  color:#97a2b4;
}

input:focus, select:focus{
  border:1px solid rgba(245,196,0,.6);
  box-shadow:0 0 0 3px rgba(245,196,0,.18);
}

button{
  cursor:pointer;
  font-weight:800;
  transition:.18s ease;
  letter-spacing:.01em;
}

button:active{
  transform:scale(.99);
}

.primary-btn{
  background:linear-gradient(180deg, var(--gold2), var(--gold));
  color:#131313;
  box-shadow:0 6px 18px rgba(245,196,0,.22);
}

.secondary-btn{
  background:var(--secondary);
  color:#fff;
}

.danger-btn{
  background:linear-gradient(180deg, #d63a3a, var(--danger));
  color:#fff;
}

.button-stack button{
  margin-bottom:10px;
}

.button-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.toggle-btn{
  background:var(--secondary);
  color:#fff;
  margin:0;
}

#historyWrap{
  display:none;
  margin-top:12px;
}

#historyWrap.open{
  display:block;
}

.history-item{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:12px;
  margin-top:10px;
}

.history-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}

.history-drone{
  font-size:18px;
  font-weight:800;
  margin-bottom:4px;
}

.history-meta{
  color:#e5e9f0;
  line-height:1.45;
}

.small{
  color:var(--muted);
  font-size:13px;
}

.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.status-text{
  color:var(--gold2);
  font-size:14px;
  margin-top:8px;
  font-weight:700;
}

.section-title{
  font-size:20px;
  font-weight:900;
  margin:0 0 12px;
}

@media (max-width:560px){
  .stats, .button-row, .action-row{
    grid-template-columns:1fr;
  }
  .logo-wrap{
    width:104px;
    height:104px;
  }
  .header h1{
    font-size:26px;
  }
}
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="logo-wrap">
      <img src="logo.png" alt="Gambit FPV Logo">
    </div>
    <h1>GAMBIT FPV</h1>
    <p>Flight Log</p>
  </div>

  <div class="card">
    <div class="section-title">Add Flight</div>

    <div class="field-group">
      <label>Drone</label>
      <select id="droneSelect">
        <option value='3" Toothpick'>3" Toothpick</option>
        <option value="75mm Whoop">75mm Whoop</option>
        <option value='5" Pirat Punch'>5" Pirat Punch</option>
        <option value='7" Long Range'>7" Long Range</option>
        <option value='10" Freestyle'>10" Freestyle</option>
        <option value='13" Freestyle'>13" Freestyle</option>
        <option value="__custom__">Custom drone...</option>
      </select>
      <input id="customDrone" type="text" placeholder="Type custom drone" style="display:none;">
    </div>

    <div class="field-group">
      <label>Duration (minutes)</label>
      <input id="duration" type="number" step="0.1" placeholder="Example: 5.5">
    </div>

    <div class="field-group">
      <label>Location</label>
      <select id="locationSelect">
        <option value="Home">Home</option>
        <option value="Flying Spot">Flying Spot</option>
        <option value="Closed Office Building">Closed Office Building</option>
        <option value="Open Area">Open Area</option>
        <option value="Treed Area">Treed Area</option>
        <option value="__custom__">Custom location...</option>
      </select>
      <input id="customLocation" type="text" placeholder="Type custom location" style="display:none;">
    </div>

    <div class="field-group">
      <label>Date / Time</label>
      <input id="date" type="datetime-local">
    </div>

    <div class="button-stack">
      <button id="saveBtn" class="primary-btn" onclick="saveFlight()">Save Flight</button>
      <button id="cancelEditBtn" class="secondary-btn" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
    </div>

    <div id="editStatus" class="status-text" style="display:none;">Editing flight...</div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Flights</div>
      <div class="stat-value" id="totalFlights">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Hours</div>
      <div class="stat-value" id="totalHours">0.00</div>
    </div>
  </div>

  <div class="card">
    <button class="toggle-btn" onclick="toggleHistory()">Flight History ▼</button>
    <div id="historyWrap">
      <div id="history"></div>
    </div>
  </div>

  <div class="card">
    <div class="button-row">
      <button class="secondary-btn" onclick="exportData()">Export Logs</button>
      <button class="secondary-btn" onclick="importData()">Import Logs</button>
    </div>
  </div>

</div>

<script>
let logs = JSON.parse(localStorage.getItem("fpvLogs")) || [];
let editIndex = -1;

const droneSelect = document.getElementById("droneSelect");
const customDrone = document.getElementById("customDrone");
const locationSelect = document.getElementById("locationSelect");
const customLocation = document.getElementById("customLocation");
const dateInput = document.getElementById("date");
const saveBtn = document.getElementById("saveBtn");
const cancelEditBtn = document.getElementById("cancelEditBtn");
const editStatus = document.getElementById("editStatus");

droneSelect.addEventListener("change", function () {
  customDrone.style.display = this.value === "__custom__" ? "block" : "none";
});

locationSelect.addEventListener("change", function () {
  customLocation.style.display = this.value === "__custom__" ? "block" : "none";
});

function setNow() {
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
    .toISOString()
    .slice(0, 16);
  dateInput.value = local;
}

function getDroneValue() {
  return droneSelect.value === "__custom__" ? customDrone.value.trim() : droneSelect.value;
}

function getLocationValue() {
  return locationSelect.value === "__custom__" ? customLocation.value.trim() : locationSelect.value;
}

function saveToStorage() {
  localStorage.setItem("fpvLogs", JSON.stringify(logs));
}

function resetForm() {
  document.getElementById("duration").value = "";
  customDrone.value = "";
  customLocation.value = "";
  droneSelect.value = '3" Toothpick';
  locationSelect.value = 'Home';
  customDrone.style.display = "none";
  customLocation.style.display = "none";
  setNow();

  editIndex = -1;
  saveBtn.textContent = "Save Flight";
  cancelEditBtn.style.display = "none";
  editStatus.style.display = "none";
}

function saveFlight() {
  let drone = getDroneValue();
  let minutes = parseFloat(document.getElementById("duration").value);
  let location = getLocationValue();
  let date = document.getElementById("date").value;

  if (!drone || isNaN(minutes) || minutes <= 0 || !location || !date) {
    alert("Fill everything");
    return;
  }

  let hours = minutes / 60;

  const entry = {
    drone,
    minutes,
    duration: hours,
    location,
    date
  };

  if (editIndex >= 0) {
    logs[editIndex] = entry;
  } else {
    logs.unshift(entry);
  }

  saveToStorage();
  checkBackupReminder();
  resetForm();
  update();
}

function editFlight(index) {
  const l = logs[index];
  if (!l) return;

  editIndex = index;

  const presetDrones = [
    '3" Toothpick',
    "75mm Whoop",
    '5" Pirat Punch',
    '7" Long Range',
    '10" Freestyle',
    '13" Freestyle'
  ];

  const presetLocations = [
    "Home",
    "Flying Spot",
    "Closed Office Building",
    "Open Area",
    "Treed Area"
  ];

  if (presetDrones.includes(l.drone)) {
    droneSelect.value = l.drone;
    customDrone.style.display = "none";
    customDrone.value = "";
  } else {
    droneSelect.value = "__custom__";
    customDrone.style.display = "block";
    customDrone.value = l.drone;
  }

  if (presetLocations.includes(l.location)) {
    locationSelect.value = l.location;
    customLocation.style.display = "none";
    customLocation.value = "";
  } else {
    locationSelect.value = "__custom__";
    customLocation.style.display = "block";
    customLocation.value = l.location;
  }

  document.getElementById("duration").value = l.minutes;
  document.getElementById("date").value = l.date;

  saveBtn.textContent = "Update Flight";
  cancelEditBtn.style.display = "block";
  editStatus.style.display = "block";

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function cancelEdit() {
  resetForm();
}

function deleteFlight(index) {
  if (!confirm("Delete this flight?")) return;

  logs.splice(index, 1);
  saveToStorage();

  if (editIndex === index) {
    resetForm();
  } else if (editIndex > index) {
    editIndex--;
  }

  update();
}

function update() {
  document.getElementById("totalFlights").innerText = logs.length;

  let total = logs.reduce((sum, l) => sum + Number(l.duration || 0), 0);
  document.getElementById("totalHours").innerText = total.toFixed(2);

  let history = document.getElementById("history");

  if (logs.length === 0) {
    history.innerHTML = '<div class="small">No flights saved yet.</div>';
    return;
  }

  let html = "";
  logs.forEach((l, index) => {
    html += `
      <div class="history-item">
        <div class="history-top">
          <div>
            <div class="history-drone">${escapeHtml(l.drone)}</div>
            <div class="history-meta">
              ${Number(l.minutes).toFixed(1)} min (${Number(l.duration).toFixed(2)} hr)<br>
              ${escapeHtml(l.location)}
            </div>
            <div class="small" style="margin-top:6px;">${escapeHtml(l.date)}</div>
          </div>
        </div>
        <div class="action-row">
          <button class="secondary-btn" onclick="editFlight(${index})">Edit</button>
          <button class="danger-btn" onclick="deleteFlight(${index})">Delete</button>
        </div>
      </div>`;
  });

  history.innerHTML = html;
}

function toggleHistory() {
  document.getElementById("historyWrap").classList.toggle("open");
}

function exportData() {
  let blob = new Blob([JSON.stringify(logs, null, 2)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fpv-log.json";
  a.click();

  localStorage.setItem("lastBackup", Date.now());
}

function importData() {
  let input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";

  input.onchange = e => {
    let file = e.target.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = () => {
      try {
        let imported = JSON.parse(reader.result);
        if (!Array.isArray(imported)) {
          alert("Invalid backup file");
          return;
        }

        logs = imported;
        saveToStorage();
        resetForm();
        update();
      } catch (err) {
        alert("Could not import file");
      }
    };
    reader.readAsText(file);
  };

  input.click();
}

function checkBackupReminder() {
  let last = localStorage.getItem("lastBackup");
  if (!last) return;

  let days = (Date.now() - last) / (1000 * 60 * 60 * 24);
  if (days > 7) {
    alert("⚠️ Backup your logs!");
  }
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

setNow();
update();
</script>

</body>
</html>
