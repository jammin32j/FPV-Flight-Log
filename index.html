<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambit FPV Flight Log</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0e1117;
  color:white;
}

/* BACKGROUND WATERMARK */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('logo.png') center center no-repeat;
  background-size:70%;
  opacity:0.04;
  pointer-events:none;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px 10px;
}

.header img{
  width:160px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(255,255,255,0.1);
}

.header h1{
  margin:10px 0 0;
  font-size:26px;
  letter-spacing:1px;
}

/* CARDS */
.card{
  background:#1c1f26;
  margin:10px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

/* INPUTS */
input, select, button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:8px;
  border:none;
  font-size:16px;
}

button{
  background:#f5c400;
  font-weight:bold;
}

/* HISTORY */
.history-item{
  background:#2a2f38;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.small{
  color:#aaa;
  font-size:13px;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <h1>GAMBIT FPV</h1>
</div>

<div class="card">
<label>Drone</label>
<select id="drone">
<option>3" Toothpick</option>
<option>75mm Whoop</option>
<option>5" Pirat Punch</option>
<option>7" Long Range</option>
<option>10" Freestyle</option>
<option>13" Freestyle</option>
</select>

<label>Duration (minutes)</label>
<input id="duration" type="number">

<label>Location</label>
<select id="location">
<option>Home</option>
<option>Flying Spot</option>
<option>Closed Office Building</option>
<option>Open Area</option>
<option>Treed Area</option>
</select>

<label>Date</label>
<input id="date" type="datetime-local">

<button onclick="saveFlight()">Save Flight</button>
</div>

<div class="card">
<b>Total Flights:</b> <span id="totalFlights">0</span><br>
<b>Total Hours:</b> <span id="totalHours">0</span>
</div>

<div class="card">
<details>
<summary>Flight History</summary>
<div id="history"></div>
</details>
</div>

<div class="card">
<button onclick="exportData()">Export Logs</button>
</div>

<script>

let logs = JSON.parse(localStorage.getItem("fpvLogs")) || [];

function saveFlight(){
  let drone = document.getElementById("drone").value;
  let minutes = parseFloat(document.getElementById("duration").value);
  let location = document.getElementById("location").value;
  let date = document.getElementById("date").value;

  if(!drone || !minutes || !location || !date){
    alert("Fill everything");
    return;
  }

  let hours = minutes / 60;

  logs.unshift({
    drone,
    minutes,
    duration:hours,
    location,
    date
  });

  localStorage.setItem("fpvLogs", JSON.stringify(logs));

  checkBackupReminder();
  update();
}

function update(){
  document.getElementById("totalFlights").innerText = logs.length;

  let total = logs.reduce((sum,l)=> sum + Number(l.duration),0);
  document.getElementById("totalHours").innerText = total.toFixed(2);

  let html="";
  logs.forEach(l=>{
    html += `
    <div class="history-item">
      <b>${l.drone}</b><br>
      ${l.minutes} min (${l.duration.toFixed(2)} hr)<br>
      ${l.location}<br>
      <div class="small">${l.date}</div>
    </div>`;
  });

  document.getElementById("history").innerHTML = html;
}

/* EXPORT */
function exportData(){
  let blob = new Blob([JSON.stringify(logs)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fpv-log.json";
  a.click();

  localStorage.setItem("lastBackup", Date.now());
}

/* BACKUP REMINDER */
function checkBackupReminder(){
  let last = localStorage.getItem("lastBackup");
  if(!last) return;

  let days = (Date.now() - last) / (1000*60*60*24);

  if(days > 7){
    alert("⚠️ Backup your logs!");
  }
}

update();

</script>

</body>
</html>
