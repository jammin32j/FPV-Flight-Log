<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPV Flight Log</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  padding: 10px;
  margin: 0;
}

h1 {
  text-align: center;
}

.card {
  background: #222;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 10px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
  box-sizing: border-box;
}

button {
  background: yellow;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

details summary {
  cursor: pointer;
  font-weight: bold;
  padding: 4px 0;
}

.history-item {
  background: #2d2d2d;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
}

.small {
  color: #ccc;
  font-size: 14px;
}
</style>
</head>
<body>

<h1>FPV Flight Log</h1>

<div class="card">
  <label>Drone</label>
  <select id="drone">
    <option>3" Toothpick</option>
    <option>75mm Whoop</option>
    <option>5" Pirat Punch</option>
    <option>7" Long Range</option>
    <option>10" Freestyle</option>
    <option>13" Freestyle</option>
  </select>

  <label>Duration (minutes)</label>
  <input id="duration" type="number" step="0.1">

  <label>Location</label>
  <select id="location">
    <option>Home</option>
    <option>Flying Spot</option>
    <option>Closed Office Building</option>
    <option>Open Area</option>
    <option>Treed Area</option>
  </select>

  <label>Date / Time</label>
  <input id="date" type="datetime-local">

  <button onclick="saveFlight()">Save Flight</button>
</div>

<div class="card">
  <b>Total Flights:</b> <span id="totalFlights">0</span><br>
  <b>Total Hours:</b> <span id="totalHours">0.00</span>
</div>

<div class="card">
  <details>
    <summary>Flight History</summary>
    <div id="history"></div>
  </details>
</div>

<div class="card">
  <button onclick="exportData()">Export Logs</button>
  <button onclick="importData()">Import Logs</button>
  <button onclick="backup()">Download Backup</button>
</div>

<script>
let logs = JSON.parse(localStorage.getItem("fpvLogs")) || [];

function saveLogs() {
  localStorage.setItem("fpvLogs", JSON.stringify(logs));
}

function saveFlight() {
  const drone = document.getElementById("drone").value;
  const minutes = parseFloat(document.getElementById("duration").value);
  const location = document.getElementById("location").value;
  const date = document.getElementById("date").value;

  if (!drone || !minutes || !location || !date) {
    alert("Fill everything");
    return;
  }

  const hours = minutes / 60;

  logs.unshift({
    drone,
    minutes: minutes,
    duration: hours,
    location,
    date
  });

  saveLogs();
  document.getElementById("duration").value = "";
  update();
}

function update() {
  document.getElementById("totalFlights").innerText = logs.length;

  const totalHours = logs.reduce((sum, l) => sum + Number(l.duration || 0), 0);
  document.getElementById("totalHours").innerText = totalHours.toFixed(2);

  const history = document.getElementById("history");

  if (logs.length === 0) {
    history.innerHTML = '<div class="small" style="margin-top:10px;">No flights saved yet.</div>';
    return;
  }

  let html = "";
  logs.forEach((l) => {
    const minutesText = l.minutes ? Number(l.minutes).toFixed(1) : (Number(l.duration) * 60).toFixed(1);
    const hoursText = Number(l.duration || 0).toFixed(2);

    html += `
      <div class="history-item">
        <div><b>${l.drone}</b></div>
        <div>${minutesText} min (${hoursText} hr)</div>
        <div>${l.location}</div>
        <div class="small">${l.date}</div>
      </div>
    `;
  });

  history.innerHTML = html;
}

function exportData() {
  const blob = new Blob([JSON.stringify(logs, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fpv-log.json";
  a.click();
}

function importData() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";

  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      try {
        const imported = JSON.parse(reader.result);
        if (!Array.isArray(imported)) {
          alert("Invalid backup file");
          return;
        }

        logs = imported;
        saveLogs();
        update();
      } catch (err) {
        alert("Could not import file");
      }
    };
    reader.readAsText(file);
  };

  input.click();
}

function backup() {
  exportData();
}

update();
</script>

</body>
</html>
