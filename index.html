<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPV Flight Log</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  padding: 10px;
}

h1 { text-align: center; }

.card {
  background: #222;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: yellow;
  color: black;
  font-weight: bold;
}

.history {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>FPV Flight Log</h1>

<div class="card">
<label>Drone</label>
<select id="drone">
<option>3" Toothpick</option>
<option>75mm Whoop</option>
<option>5" Pirat Punch</option>
<option>7" Long Range</option>
<option>10" Freestyle</option>
<option>13" Freestyle</option>
</select>

<label>Duration (minutes)</label>
<input id="duration" type="number" step="0.1">

<label>Location</label>
<select id="location">
<option>Home</option>
<option>Flying Spot</option>
<option>Closed Office Building</option>
<option>Open Area</option>
<option>Treed Area</option>
</select>

<label>Date / Time</label>
<input id="date" type="datetime-local">

<button onclick="saveFlight()">Save Flight</button>
</div>

<div class="card">
<b>Total Flights:</b> <span id="totalFlights">0</span><br>
<b>Total Hours:</b> <span id="totalHours">0</span>
</div>

<div class="card">
<button onclick="toggleHistory()">Flight History ▼</button>
<div id="history" class="history" style="display:none;"></div>
</div>

<div class="card">
<button onclick="exportData()">Export Logs</button>
<button onclick="importData()">Import Logs</button>
<button onclick="backup()">Download Backup</button>
</div>

<script>

let logs = JSON.parse(localStorage.getItem("fpvLogs")) || [];

function saveFlight(){
  let drone = document.getElementById("drone").value;
  let minutes = parseFloat(document.getElementById("duration").value);
  let location = document.getElementById("location").value;
  let date = document.getElementById("date").value;

  if(!drone || !minutes || !location || !date){
    alert("Fill everything");
    return;
  }

  let hours = minutes / 60;

  logs.unshift({drone, duration: hours, location, date});
  localStorage.setItem("fpvLogs", JSON.stringify(logs));

  update();
}

function update(){
  document.getElementById("totalFlights").innerText = logs.length;

  let hours = logs.reduce((sum,l)=> sum + Number(l.duration),0);
  document.getElementById("totalHours").innerText = hours.toFixed(2);

  let html = "";
  logs.forEach(l=>{
    html += `<div>
      <b>${l.drone}</b><br>
      ${l.duration.toFixed(2)} hr - ${l.location}<br>
      ${l.date}<hr>
    </div>`;
  });

  document.getElementById("history").innerHTML = html;
}

function toggleHistory(){
  let h = document.getElementById("history");
  h.style.display = h.style.display === "none" ? "block" : "none";
}

function exportData(){
  let blob = new Blob([JSON.stringify(logs)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fpv-log.json";
  a.click();
}

function importData(){
  let input = document.createElement("input");
  input.type = "file";
  input.onchange = e=>{
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = ()=>{
      logs = JSON.parse(reader.result);
      localStorage.setItem("fpvLogs", JSON.stringify(logs));
      update();
    };
    reader.readAsText(file);
  };
  input.click();
}

function backup(){
  exportData();
}

update();

</script>

</body>
</html>
