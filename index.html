<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gambit FPV Flight Log</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0e1117;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('logo.png') center center no-repeat;
  background-size: 70%;
  opacity: 0.04;
  pointer-events: none;
}

.header {
  text-align: center;
  padding: 20px 10px;
}

.header img {
  width: 160px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

.header h1 {
  margin: 10px 0 0;
  font-size: 26px;
  letter-spacing: 1px;
}

.card {
  background: #1c1f26;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.6);
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  background: #f5c400;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 8px;
}

.history-item {
  background: #2a2f38;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

.small {
  color: #aaa;
  font-size: 13px;
}

.field-group {
  margin-bottom: 14px;
}

.toggle-btn {
  background: #343a46;
  color: white;
  margin-top: 8px;
}

#historyWrap {
  display: none;
  margin-top: 10px;
}

#historyWrap.open {
  display: block;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" alt="Gambit FPV Logo">
  <h1>GAMBIT FPV</h1>
</div>

<div class="card">
  <div class="field-group">
    <label>Drone</label>
    <select id="droneSelect">
      <option value='3" Toothpick'>3" Toothpick</option>
      <option value="75mm Whoop">75mm Whoop</option>
      <option value='5" Pirat Punch'>5" Pirat Punch</option>
      <option value='7" Long Range'>7" Long Range</option>
      <option value='10" Freestyle'>10" Freestyle</option>
      <option value='13" Freestyle'>13" Freestyle</option>
      <option value="__custom__">Custom drone...</option>
    </select>
    <input id="customDrone" type="text" placeholder="Type custom drone" style="display:none;">
  </div>

  <div class="field-group">
    <label>Duration (minutes)</label>
    <input id="duration" type="number" step="0.1">
  </div>

  <div class="field-group">
    <label>Location</label>
    <select id="locationSelect">
      <option value="Home">Home</option>
      <option value="Flying Spot">Flying Spot</option>
      <option value="Closed Office Building">Closed Office Building</option>
      <option value="Open Area">Open Area</option>
      <option value="Treed Area">Treed Area</option>
      <option value="__custom__">Custom location...</option>
    </select>
    <input id="customLocation" type="text" placeholder="Type custom location" style="display:none;">
  </div>

  <div class="field-group">
    <label>Date</label>
    <input id="date" type="datetime-local">
  </div>

  <button onclick="saveFlight()">Save Flight</button>
</div>

<div class="card">
  <b>Total Flights:</b> <span id="totalFlights">0</span><br>
  <b>Total Hours:</b> <span id="totalHours">0.00</span>
</div>

<div class="card">
  <button class="toggle-btn" onclick="toggleHistory()">Flight History ▼</button>
  <div id="historyWrap">
    <div id="history"></div>
  </div>
</div>

<div class="card">
  <button onclick="exportData()">Export Logs</button>
  <button onclick="importData()">Import Logs</button>
</div>

<script>
let logs = JSON.parse(localStorage.getItem("fpvLogs")) || [];

const droneSelect = document.getElementById("droneSelect");
const customDrone = document.getElementById("customDrone");
const locationSelect = document.getElementById("locationSelect");
const customLocation = document.getElementById("customLocation");

droneSelect.addEventListener("change", function () {
  customDrone.style.display = this.value === "__custom__" ? "block" : "none";
});

locationSelect.addEventListener("change", function () {
  customLocation.style.display = this.value === "__custom__" ? "block" : "none";
});

function getDroneValue() {
  if (droneSelect.value === "__custom__") {
    return customDrone.value.trim();
  }
  return droneSelect.value;
}

function getLocationValue() {
  if (locationSelect.value === "__custom__") {
    return customLocation.value.trim();
  }
  return locationSelect.value;
}

function saveFlight() {
  let drone = getDroneValue();
  let minutes = parseFloat(document.getElementById("duration").value);
  let location = getLocationValue();
  let date = document.getElementById("date").value;

  if (!drone || isNaN(minutes) || minutes <= 0 || !location || !date) {
    alert("Fill everything");
    return;
  }

  let hours = minutes / 60;

  logs.unshift({
    drone,
    minutes,
    duration: hours,
    location,
    date
  });

  localStorage.setItem("fpvLogs", JSON.stringify(logs));

  document.getElementById("duration").value = "";
  document.getElementById("date").value = "";
  customDrone.value = "";
  customLocation.value = "";
  droneSelect.value = '3" Toothpick';
  locationSelect.value = 'Home';
  customDrone.style.display = "none";
  customLocation.style.display = "none";

  checkBackupReminder();
  update();
}

function update() {
  document.getElementById("totalFlights").innerText = logs.length;

  let total = logs.reduce((sum, l) => sum + Number(l.duration || 0), 0);
  document.getElementById("totalHours").innerText = total.toFixed(2);

  let history = document.getElementById("history");

  if (logs.length === 0) {
    history.innerHTML = '<div class="small">No flights saved yet.</div>';
    return;
  }

  let html = "";
  logs.forEach(l => {
    html += `
      <div class="history-item">
        <b>${escapeHtml(l.drone)}</b><br>
        ${Number(l.minutes).toFixed(1)} min (${Number(l.duration).toFixed(2)} hr)<br>
        ${escapeHtml(l.location)}<br>
        <div class="small">${escapeHtml(l.date)}</div>
      </div>`;
  });

  history.innerHTML = html;
}

function toggleHistory() {
  document.getElementById("historyWrap").classList.toggle("open");
}

function exportData() {
  let blob = new Blob([JSON.stringify(logs, null, 2)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "fpv-log.json";
  a.click();

  localStorage.setItem("lastBackup", Date.now());
}

function importData() {
  let input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";

  input.onchange = e => {
    let file = e.target.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = () => {
      try {
        let imported = JSON.parse(reader.result);
        if (!Array.isArray(imported)) {
          alert("Invalid backup file");
          return;
        }

        logs = imported;
        localStorage.setItem("fpvLogs", JSON.stringify(logs));
        update();
      } catch (err) {
        alert("Could not import file");
      }
    };
    reader.readAsText(file);
  };

  input.click();
}

function checkBackupReminder() {
  let last = localStorage.getItem("lastBackup");
  if (!last) return;

  let days = (Date.now() - last) / (1000 * 60 * 60 * 24);
  if (days > 7) {
    alert("⚠️ Backup your logs!");
  }
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

update();
</script>

</body>
</html>
