<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#facc15" />
  <title>FPV Flight Log</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #facc15;
      --accent-dark: #eab308;
      --danger: #dc2626;
      --border: #e2e8f0;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom) 14px;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 14px 0 32px;
    }

    .hero, .card {
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero {
      background: linear-gradient(135deg, #fde047, #facc15, #f59e0b);
      padding: 20px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 32px;
      line-height: 1.05;
    }

    .sub {
      margin: 0;
      color: rgba(15, 23, 42, 0.78);
      font-size: 15px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .stats {
      grid-template-columns: repeat(2, 1fr);
      margin-bottom: 14px;
    }

    .card {
      padding: 16px;
      margin-bottom: 14px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
    }

    .section-title {
      font-size: 22px;
      margin: 0 0 14px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 15px;
    }

    input, select, button {
      width: 100%;
      min-height: 52px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 0 16px;
      font-size: 17px;
      background: #fff;
    }

    button {
      border: none;
      font-weight: 800;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #111827;
    }

    .primary:active { background: var(--accent-dark); }

    .secondary {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .history-item {
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fff;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .history-name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .history-meta, .history-time {
      color: var(--muted);
      font-size: 14px;
    }

    .mini-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .mini-actions button {
      width: auto;
      min-height: 42px;
      padding: 0 14px;
      font-size: 14px;
      border-radius: 16px;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
      margin-top: 8px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 12px;
      border: 2px dashed var(--border);
      border-radius: 24px;
    }

    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
      .section-title { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>FPV Flight Log</h1>
      <p class="sub">Simple iPhone flight logger for drone, duration, location, and date/time.</p>
    </div>

    <div class="grid stats">
      <div class="card">
        <div class="stat-label">Total Flights</div>
        <div class="stat-value" id="totalFlights">0</div>
      </div>
      <div class="card">
        <div class="stat-label">Total Minutes</div>
        <div class="stat-value" id="totalMinutes">0.0</div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title" id="formTitle">Add Flight</h2>

      <div class="field">
        <label for="drone">Drone</label>
        <select id="drone"></select>
      </div>

      <div class="field">
        <label for="duration">Duration (minutes)</label>
        <input id="duration" type="number" inputmode="decimal" step="0.1" placeholder="5.0" />
      </div>

      <div class="field">
        <label for="location">Location</label>
        <select id="location"></select>
      </div>

      <div class="field">
        <label for="dateTime">Date and Time</label>
        <input id="dateTime" type="datetime-local" />
      </div>

      <div class="row">
        <button class="primary" id="saveBtn">Save Flight</button>
        <button class="secondary" id="cancelBtn" style="display:none;">Cancel</button>
      </div>

      <p class="hint">After you host this file online, open it in Safari on your iPhone and tap Share → Add to Home Screen.</p>
    </div>

    <div class="card">
      <div class="row" style="margin-bottom:12px;">
        <button class="secondary" id="exportBtn">Export Logs</button>
        <label class="secondary" style="display:flex;align-items:center;justify-content:center;cursor:pointer;">
          Import Logs
          <input id="importInput" type="file" accept="application/json" style="display:none;" />
        </label>
      </div>
      <button class="danger" id="clearBtn">Clear All Logs</button>
    </div>

    <div class="card">
      <h2 class="section-title">Flight History</h2>
      <div id="history"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "fpv-simple-flight-log-single-file-v1";

    const DRONES = [
      { name: '3" Toothpick', locations: ["Home"] },
      { name: "75mm Whoop", locations: ["Home"] },
      { name: '5" Pirat Punch', locations: ["Flying Spot", "Closed Office Building"] },
      { name: '7" Long Range', locations: ["Open Area", "Treed Area"] },
      { name: '10" Freestyle', locations: ["Open Area", "Treed Area"] },
      { name: '13" Freestyle', locations: ["Open Area", "Treed Area"] },
    ];

    const droneMap = Object.fromEntries(DRONES.map(d => [d.name, d]));

    let logs = [];
    let editingId = null;

    const droneEl = document.getElementById("drone");
    const durationEl = document.getElementById("duration");
    const locationEl = document.getElementById("location");
    const dateTimeEl = document.getElementById("dateTime");
    const saveBtn = document.getElementById("saveBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const historyEl = document.getElementById("history");
    const totalFlightsEl = document.getElementById("totalFlights");
    const totalMinutesEl = document.getElementById("totalMinutes");
    const formTitleEl = document.getElementById("formTitle");
    const exportBtn = document.getElementById("exportBtn");
    const importInput = document.getElementById("importInput");
    const clearBtn = document.getElementById("clearBtn");

    function nowLocalDateTime() {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hour = String(d.getHours()).padStart(2, "0");
      const minute = String(d.getMinutes()).padStart(2, "0");
      return `${year}-${month}-${day}T${hour}:${minute}`;
    }

    function loadLogs() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        logs = saved ? JSON.parse(saved) : [];
        if (!Array.isArray(logs)) logs = [];
      } catch {
        logs = [];
      }
    }

    function saveLogs() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }

    function populateDrones() {
      droneEl.innerHTML = "";
      DRONES.forEach(drone => {
        const option = document.createElement("option");
        option.value = drone.name;
        option.textContent = drone.name;
        droneEl.appendChild(option);
      });
    }

    function populateLocations(droneName, selectedLocation) {
      const drone = droneMap[droneName] || DRONES[0];
      locationEl.innerHTML = "";
      drone.locations.forEach(location => {
        const option = document.createElement("option");
        option.value = location;
        option.textContent = location;
        locationEl.appendChild(option);
      });
      locationEl.value = selectedLocation && drone.locations.includes(selectedLocation)
        ? selectedLocation
        : drone.locations[0];
    }

    function resetForm() {
      editingId = null;
      formTitleEl.textContent = "Add Flight";
      saveBtn.textContent = "Save Flight";
      cancelBtn.style.display = "none";
      droneEl.value = DRONES[0].name;
      populateLocations(DRONES[0].name);
      durationEl.value = "";
      dateTimeEl.value = nowLocalDateTime();
    }

    function updateStats() {
      const totalFlights = logs.length;
      const totalMinutes = logs.reduce((sum, log) => sum + (parseFloat(log.duration) || 0), 0);
      totalFlightsEl.textContent = totalFlights;
      totalMinutesEl.textContent = totalMinutes.toFixed(1);
    }

    function renderHistory() {
      historyEl.innerHTML = "";

      if (!logs.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No flights logged yet.";
        historyEl.appendChild(empty);
        return;
      }

      const sorted = [...logs].sort((a, b) => a.dateTime < b.dateTime ? 1 : -1);

      sorted.forEach(log => {
        const item = document.createElement("div");
        item.className = "history-item";

        item.innerHTML = `
          <div class="history-top">
            <div>
              <div class="history-name"></div>
              <div class="history-meta"></div>
              <div class="history-time"></div>
            </div>
            <div class="mini-actions">
              <button class="secondary edit-btn">Edit</button>
              <button class="danger delete-btn">Delete</button>
            </div>
          </div>
        `;

        item.querySelector(".history-name").textContent = log.drone;
        item.querySelector(".history-meta").textContent = `${log.duration} min · ${log.location}`;
        item.querySelector(".history-time").textContent = (log.dateTime || "").replace("T", " ");

        item.querySelector(".edit-btn").addEventListener("click", () => {
          editingId = log.id;
          formTitleEl.textContent = "Edit Flight";
          saveBtn.textContent = "Save Changes";
          cancelBtn.style.display = "block";
          droneEl.value = log.drone;
          populateLocations(log.drone, log.location);
          durationEl.value = log.duration;
          dateTimeEl.value = log.dateTime;
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        item.querySelector(".delete-btn").addEventListener("click", () => {
          logs = logs.filter(x => x.id !== log.id);
          saveLogs();
          updateStats();
          renderHistory();
          if (editingId === log.id) resetForm();
        });

        historyEl.appendChild(item);
      });
    }

    function makeId() {
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    droneEl.addEventListener("change", () => {
      populateLocations(droneEl.value);
    });

    saveBtn.addEventListener("click", () => {
      const drone = droneEl.value;
      const duration = durationEl.value.trim();
      const location = locationEl.value;
      const dateTime = dateTimeEl.value;

      if (!drone || !duration || !location || !dateTime) {
        alert("Please fill in all four fields.");
        return;
      }

      const flight = {
        id: editingId || makeId(),
        drone,
        duration,
        location,
        dateTime,
      };

      if (editingId) {
        logs = logs.map(log => log.id === editingId ? flight : log);
      } else {
        logs.unshift(flight);
      }

      saveLogs();
      updateStats();
      renderHistory();
      resetForm();
    });

    cancelBtn.addEventListener("click", () => {
      resetForm();
    });

    exportBtn.addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(logs, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "fpv-flight-log.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    importInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported)) throw new Error();
          logs = imported;
          saveLogs();
          updateStats();
          renderHistory();
          resetForm();
        } catch {
          alert("That file could not be imported.");
        }
      };
      reader.readAsText(file);
      e.target.value = "";
    });

    clearBtn.addEventListener("click", () => {
      if (confirm("Delete all saved logs?")) {
        logs = [];
        saveLogs();
        updateStats();
        renderHistory();
        resetForm();
      }
    });

    populateDrones();
    loadLogs();
    updateStats();
    renderHistory();
    resetForm();
  </script>
</body>
</html>
